<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Paulin Akam Soh - Plateforme Musicale</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;background:#0f0f0f;color:#fff}header{background:#202020;padding:15px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}.logo{font-size:20px;font-weight:bold}nav a{color:#aaa;text-decoration:none;margin-left:15px}nav a:hover{color:#fff}.btn{background:#cc0000;color:#fff;padding:8px 16px;border-radius:20px;border:none;cursor:pointer}.hero{text-align:center;padding:40px 20px;background:linear-gradient(135deg,#1a1a2e,#16213e)}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;max-width:1200px;margin:20px auto;padding:20px}.card{background:#1e1e1e;border-radius:10px;overflow:hidden;cursor:pointer}.card:hover{transform:translateY(-5px)}.thumb{width:100%;aspect-ratio:16/9;background:#333;display:flex;align-items:center;justify-content:center}.play{width:50px;height:50px;background:rgba(0,0,0,0.7);border-radius:50%}.info{padding:12px}.title{font-size:14px;font-weight:bold;margin-bottom:5px}.meta{font-size:12px;color:#aaa}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:1000;justify-content:center;align-items:center}.modal.active{display:flex}.modal-content{background:#1e1e1e;border-radius:15px;max-width:800px;width:90%;max-height:90vh;overflow:auto}.modal-header{padding:15px;border-bottom:1px solid #333;display:flex;justify-content:space-between}.close{background:none;border:none;color:#fff;font-size:24px;cursor:pointer}.player{width:100%;aspect-ratio:16/9}form{display:flex;flex-direction:column;gap:10px;padding:20px}input,textarea,select{padding:10px;border-radius:5px;border:1px solid #333;background:#2a2a2a;color:#fff}button[type=submit]{background:#cc0000;color:#fff;padding:10px;border:none;border-radius:5px;cursor:pointer}</style></head><body><header><div class="logo">Paulin☀ Akam Soh</div><nav><a href="#accueil">Accueil</a><a href="#videos">Vidéos</a><button id="adminBtn" class="btn">Espace Artiste</button><button id="logoutBtn" class="btn" style="display:none">Déconnexion</button></nav></header><section id="accueil" class="hero"><h1>🎤 Bienvenue sur la plateforme de Paulin Akam Soh</h1><p>Seul Paulin peut publier. Les autres sont spectateurs.</p></section><main class="grid" id="videosGrid"></main><div id="videoModal" class="modal"><div class="modal-content"><div class="modal-header"><h3 id="mTitle"></h3><button class="close" onclick="closeModal()">×</button></div><div id="player" class="player"></div><p id="mDesc" style="padding:15px;color:#ccc"></p></div></div><div id="loginModal" class="modal"><div class="modal-content" style="max-width:400px"><div class="modal-header"><h3>Connexion Artiste</h3><button class="close" onclick="closeLogin()">×</button></div><form id="loginForm"><input type="text" id="user" placeholder="Utilisateur" required><input type="password" id="pass" placeholder="Mot de passe" required><button type="submit">Se connecter</button></form></div></div><div id="adminModal" class="modal"><div class="modal-content" style="max-width:600px"><div class="modal-header"><h3>Publier une vidéo</h3><button class="close" onclick="closeAdmin()">×</button></div><form id="pubForm"><input type="text" id="vTitle" placeholder="Titre" required><input type="text" id="vUrl" placeholder="URL YouTube ou fichier audio" required><select id="vType"><option value="youtube">YouTube</option><option value="audio">Audio</option></select><textarea id="vDesc" placeholder="Description" rows="3"></textarea><button type="submit">Publier</button></form><div id="pubList" style="padding:20px"></div></div></div><script>const USER="paulin",PASS="paulin237";let admin=false;let videos=JSON.parse(localStorage.getItem("paulinVids"))||[{id:1,title:"TCHAMA",type:"audio",url:"musique1.mp3",desc:"Est pitié de moi",date:"2024-01-15",views:1250},{id:2,title:"LESSA MBOLE",type:"audio",url:"musique2.mp3",desc:"Tradition et citadisme",date:"2024-01-20",views:980},{id:3,title:"LADEUR",type:"audio",url:"musique3.mp3",desc:"Le mariage cest le bonheur",date:"2024-02-01",views:1500}];function save(){localStorage.setItem("paulinVids",JSON.stringify(videos));}function render(){const g=document.getElementById("videosGrid");g.innerHTML="";videos.forEach(v=>{const c=document.createElement("div");c.className="card";c.onclick=()=>open(v);c.innerHTML="<div class=\"thumb\"><div class=\"play\"></div></div><div class=\"info\"><div class=\"title\">"+v.title+"</div><div class=\"meta\">"+v.date+" • "+v.views+" vues</div></div>";g.appendChild(c);});if(admin)renderAdmin();}function open(v){document.getElementById("mTitle").textContent=v.title;document.getElementById("mDesc").textContent=v.desc;const p=document.getElementById("player");if(v.type==="youtube"){const id=v.url.split("v=")[1]?.split("&")[0]||v.url.split("/").pop();p.innerHTML="<iframe src=\"https://www.youtube.com/embed/"+id+"?autoplay=1\" frameborder=\"0\" allow=\"autoplay\" style=\"width:100%;height:100%\"></iframe>";}else{p.innerHTML="<video controls autoplay style=\"width:100%;height:100%\"><source src=\""+v.url+"\" type=\"audio/mp3\"></video>";}document.getElementById("videoModal").classList.add("active");v.views++;save();render();}function closeModal(){document.getElementById("videoModal").classList.remove("active");document.getElementById("player").innerHTML="";}document.getElementById("adminBtn").onclick=()=>{if(admin)openAdmin();else document.getElementById("loginModal").classList.add("active");};document.getElementById("logoutBtn").onclick=()=>{admin=false;document.getElementById("logoutBtn").style.display="none";document.getElementById("adminBtn").style.display="block";alert("Déconnecté");};document.getElementById("loginForm").onsubmit=e=>{e.preventDefault();if(document.getElementById("user").value===USER&&document.getElementById("pass").value===PASS){admin=true;closeLogin();document.getElementById("logoutBtn").style.display="block";document.getElementById("adminBtn").style.display="none";openAdmin();alert("Bienvenue Paulin!");}else{alert("Erreur identifiants");}};document.getElementById("pubForm").onsubmit=e=>{e.preventDefault();const nv={id:Date.now(),title:document.getElementById("vTitle").value,type:document.getElementById("vType").value,url:document.getElementById("vUrl").value,desc:document.getElementById("vDesc").value,date:new Date().toISOString().split("T")[0],views:0};videos.unshift(nv);save();render();e.target.reset();renderAdmin();alert("Publié!");};function renderAdmin(){const c=document.getElementById("pubList");c.innerHTML="<h4>Vos publications</h4>";videos.forEach((v,i)=>{c.innerHTML+="<div style=\"background:#2a2a2a;padding:10px;margin:5px 0;border-radius:5px;display:flex;justify-content:space-between\"><span>"+v.title+"</span><button onclick=\"del("+i+")\" style=\"background:red;color:#fff;border:none;padding:5px 10px;border-radius:3px;cursor:pointer\">X</button></div>";});}function del(i){if(confirm("Supprimer?")){videos.splice(i,1);save();render();renderAdmin();}}function openAdmin(){document.getElementById("adminModal").classList.add("active");}function closeLogin(){document.getElementById("loginModal").classList.remove("active");}function closeAdmin(){document.getElementById("adminModal").classList.remove("active");}window.onclick=e=>{if(e.target.classList.contains("modal")){e.target.classList.remove("active");if(e.target.id==="videoModal")document.getElementById("player").innerHTML="";}};render();</script></body></html>
